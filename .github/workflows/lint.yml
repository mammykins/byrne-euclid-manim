name: Validate changes

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/

      - name: Lint
        run: uv run ruff check src/ scripts/ tests/

      - name: Build curriculum artefacts
        run: uv run python scripts/build_manifest.py
