name: Render animations

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "manim.cfg"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/

      - name: Lint
        run: uv run ruff check src/ scripts/ tests/

      - name: Render Proposition I
        run: uv run python scripts/render_one.py PropI --quality m

      - name: Upload rendered outputs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-animations
          path: output/
          retention-days: 30
