name: Render animations

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/render.yml"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "curriculum/**"
      - "manim.cfg"
      - "pyproject.toml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/

      - name: Lint
        run: uv run ruff check src/ scripts/ tests/

      - name: Build curriculum artefacts
        run: uv run python scripts/build_manifest.py

      - name: Render all scenes
        run: uv run python scripts/render_all.py --quality h

      - name: Convert MP4 outputs to GIF
        run: bash scripts/gif_convert.sh

      - name: Upload rendered outputs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-animations
          path: output/
          retention-days: 30

      - name: Upload curriculum artefacts
        uses: actions/upload-artifact@v4
        with:
          name: curriculum-artefacts
          path: |
            curriculum/curriculum_manifest.json
            docs/curriculum_mapping.md
          retention-days: 30

      - name: Attach release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/gif/*.gif
            output/mp4/*.mp4
            output/png/*.png
            curriculum/curriculum_manifest.json
